services:
  postgres:
    image: postgres:16-alpine
    container_name: taskly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskly}
      POSTGRES_DB: ${POSTGRES_DB:-taskly}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - taskly_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskly} -d ${POSTGRES_DB:-taskly}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  taskly_pg_data:


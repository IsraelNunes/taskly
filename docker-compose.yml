services:
  postgres:
    image: postgres:16-alpine
    container_name: taskly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskly
      POSTGRES_PASSWORD: taskly
      POSTGRES_DB: taskly
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - taskly_pg_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskly -d taskly"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  taskly_pg_data:

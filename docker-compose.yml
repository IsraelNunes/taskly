services:
  postgres:
    image: postgres:16-alpine
    container_name: taskly-postgres
    environment:
      POSTGRES_USER: taskly
      POSTGRES_PASSWORD: taskly
      POSTGRES_DB: taskly
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - taskly_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskly -d taskly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  taskly_pg_data:
